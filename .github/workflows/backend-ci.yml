name: Backend CI

on:
  workflow_dispatch:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    env:
      CODEX_SCRATCH: ${{ runner.temp }}/codex-scratch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run foundation integration test
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw "-Dtest=FoundationBootstrapIntegrationTest" test
      - name: Compile backend
        working-directory: apps/api
        run: |
          chmod +x ./mvnw
          ./mvnw -DskipTests compile
      - name: Validate foundation compose
        run: docker compose -f infra/docker-compose/docker-compose.yml config
