name: Backend CI

on:
  workflow_dispatch:
  pull_request:
  push:


concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: Build, test, and validate backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        shell: bash
        working-directory: apps/api

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run full Maven verification
        run: ./mvnw --batch-mode --no-transfer-progress verify

      - name: Validate Docker Compose
        working-directory: .
        run: docker compose -f infra/docker-compose/docker-compose.yml config

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          if-no-files-found: ignore
          path: |
            apps/api/target/surefire-reports/**
            apps/api/target/failsafe-reports/**