spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

kay-ledger:
  bootstrap:
    operator-admin-key: test-bootstrap-operator-key
  async:
    kafka:
      topic: kay-ledger.test.events
      consumer-group-id: kay-ledger-test-projections
    relay:
      batch-size: 10
      max-attempts: 2
      backoff-seconds: 1
