spring:
  application:
    name: kay-ledger-api
  datasource:
    url: ${KAY_LEDGER_DB_URL:jdbc:postgresql://localhost:5432/kay_ledger}
    username: ${KAY_LEDGER_DB_USERNAME:kay_ledger}
    password: ${KAY_LEDGER_DB_PASSWORD:kay_ledger}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAY_LEDGER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      probes:
        enabled: true

integrations:
  redis:
    url: ${KAY_LEDGER_REDIS_URL:redis://localhost:6379}
  kafka:
    bootstrap-servers: ${KAY_LEDGER_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

kay-ledger:
  bootstrap:
    operator-admin-key: ${KAY_LEDGER_BOOTSTRAP_OPERATOR_ADMIN_KEY:}
  async:
    kafka:
      topic: ${KAY_LEDGER_EVENTS_TOPIC:kay-ledger.events}
      consumer-group-id: ${KAY_LEDGER_EVENTS_CONSUMER_GROUP:kay-ledger-api-projections}
    relay:
      batch-size: ${KAY_LEDGER_OUTBOX_RELAY_BATCH_SIZE:25}
      max-attempts: ${KAY_LEDGER_OUTBOX_MAX_ATTEMPTS:3}
      backoff-seconds: ${KAY_LEDGER_OUTBOX_BACKOFF_SECONDS:30}
  search:
    opensearch:
      endpoint: ${KAY_LEDGER_OPENSEARCH_ENDPOINT:http://localhost:9200}
      investigation-index: ${KAY_LEDGER_OPENSEARCH_INVESTIGATION_INDEX:kay-ledger-investigation}
  object-storage:
    endpoint: ${KAY_LEDGER_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${KAY_LEDGER_OBJECT_STORAGE_REGION:us-east-1}
    bucket: ${KAY_LEDGER_OBJECT_STORAGE_BUCKET:kay-ledger-exports}
    access-key: ${KAY_LEDGER_OBJECT_STORAGE_ACCESS_KEY:kay_ledger}
    secret-key: ${KAY_LEDGER_OBJECT_STORAGE_SECRET_KEY:kay_ledger_secret}
    path-style-access-enabled: ${KAY_LEDGER_OBJECT_STORAGE_PATH_STYLE:true}
  temporal:
    enabled: ${KAY_LEDGER_TEMPORAL_ENABLED:true}
    target: ${KAY_LEDGER_TEMPORAL_TARGET:localhost:7233}
    namespace: ${KAY_LEDGER_TEMPORAL_NAMESPACE:default}
    worker-enabled: ${KAY_LEDGER_TEMPORAL_WORKER_ENABLED:true}
    task-queues:
      operator-workflows: ${KAY_LEDGER_TEMPORAL_OPERATOR_TASK_QUEUE:kay-ledger-operator-workflows}
    workflow:
      start-to-close-timeout-seconds: ${KAY_LEDGER_TEMPORAL_WORKFLOW_TIMEOUT_SECONDS:3600}
