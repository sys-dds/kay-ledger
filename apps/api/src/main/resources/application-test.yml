spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

kay-ledger:
  bootstrap:
    operator-admin-key: test-bootstrap-operator-key
  async:
    kafka:
      topic: kay-ledger.test.events
      consumer-group-id: kay-ledger-test-projections
    relay:
      batch-size: 10
      max-attempts: 2
      backoff-seconds: 1
  search:
    opensearch:
      endpoint: http://localhost:9200
      investigation-index: kay-ledger-test-investigation
  object-storage:
    endpoint: http://localhost:9000
    region: us-east-1
    bucket: kay-ledger-test-exports
    access-key: kay_ledger
    secret-key: kay_ledger_secret
    path-style-access-enabled: true
  temporal:
    enabled: false
    target: localhost:7233
    namespace: default
    worker-enabled: false
    task-queues:
      operator-workflows: kay-ledger-test-operator-workflows
    workflow:
      start-to-close-timeout-seconds: 60
      activity-start-to-close-timeout-seconds: 30
      retry-initial-interval-seconds: 1
      retry-maximum-interval-seconds: 2
      retry-maximum-attempts: 2
